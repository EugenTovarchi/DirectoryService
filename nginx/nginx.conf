events {
    worker_connections 1024;
}

http {
    # Docker DNS: имена сервисов резолвятся во время запроса, поэтому Nginx стартует без backend-контейнеров.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Лимит для больших загрузок FileService.
    client_max_body_size 5G;

    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_connect_timeout 60s;

    server {
        listen 80;

        # Быстрая проверка, что сам Nginx жив.
        location = /nginx/health {
            default_type text/plain;
            return 200 "ok";
        }

        location = /file-service {
            return 308 /file-service/;
        }

        # FileService: убираем префикс /file-service перед проксированием.
        location /file-service/ {
            set $file_service http://file-service:8080;
            rewrite ^/file-service/(.*)$ /$1 break;
            proxy_pass $file_service;
            proxy_http_version 1.1;

            # Передаем исходный host/proxy metadata в backend.
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Prefix /file-service;
        }

        location = /directory-service {
            return 308 /directory-service/;
        }

        # DirectoryService: убираем префикс /directory-service перед проксированием.
        location /directory-service/ {
            set $directory_service http://directory-service:8080;
            rewrite ^/directory-service/(.*)$ /$1 break;
            proxy_pass $directory_service;
            proxy_http_version 1.1;

            # Передаем исходный host/proxy metadata в backend.
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Prefix /directory-service;
        }

        location = /auth-service {
            return 308 /auth-service/;
        }

        # AuthService: убираем префикс /auth-service перед проксированием.
        location /auth-service/ {
            set $auth_service http://auth-service:8003;
            rewrite ^/auth-service/(.*)$ /$1 break;
            proxy_pass $auth_service;
            proxy_http_version 1.1;

            # Передаем исходный host/proxy metadata в backend.
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Prefix /auth-service;
        }
    }
}
