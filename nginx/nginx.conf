events {
    worker_connections 1024;
}

http {
    client_max_body_size 5G;

    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_connect_timeout 60s;

    server {
        listen 80;

        location = /nginx/health {
            default_type text/plain;
            return 200 "ok";
        }

        location = /file-service {
            return 308 /file-service/;
        }

        location /file-service/ {
            proxy_pass http://file-service:8080/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Prefix /file-service;
        }

        location = /directory-service {
            return 308 /directory-service/;
        }

        location /directory-service/ {
            proxy_pass http://directory-service:8080/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Prefix /directory-service;
        }

        location = /auth-service {
            return 308 /auth-service/;
        }

        location /auth-service/ {
            proxy_pass http://auth-service:8003/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Prefix /auth-service;
        }
    }
}
