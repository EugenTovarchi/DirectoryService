services:
  # Бэкенд-сервисы: прямые порты оставлены для разработки без Nginx.
  directory-service:
    container_name: directory-service
    build:
      context: .
      dockerfile: /backend/DirectoryService/DirectoryService.Web/Dockerfile
      secrets:
        - nuget_config
        - nuget_username
        - nuget_password
    ports:
      - "9002:8080"
    env_file:
      - DirectoryService.Development.env
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ASPNETCORE_URLS=http://+:8080
    depends_on:
      postgres:
        condition: service_healthy
      seq:
        condition: service_started
      loki:
        condition: service_started
    restart: unless-stopped

  # Общая инфраструктура для локального Docker-окружения.
  seq:
    container_name: directory-service-seq
    image: datalust/seq:2025.2
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_NOAUTHENTICATION: "true"
    ports:
      - "15341:5341"
      - "8081:80"
    restart: always

  postgres:
    container_name: directory-service-postgres
    image: postgres:15.15-alpine
    env_file:
      - DirectoryService.Development.env
    ports:
      - "5434:5432"
    volumes:
      - D:/docker-data/directory-service/postgres:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgresUser -d directory_service" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    container_name: redis
    image: redis:7.4.8-alpine
    ports:
      - "6379:6379"
    volumes:
      - D:/docker-data/shared/redis:/data
    restart: always

  minio:
    container_name: file-service-minio
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    env_file:
      - FileService.Development.env
    ports:
      - "19000:9000"
      - "19001:9001"
    volumes:
      - D:/docker-data/file-service/minio:/data
    command: server /data --console-address ":9001"
    restart: always

  file-service:
    container_name: file-service
    build:
      context: .
      dockerfile: /backend/FileService/FileService.Web/Dockerfile
      secrets:
        - nuget_config
        - nuget_username
        - nuget_password
    ports:
      - "8002:8080"
    env_file:
      - FileService.Development.env
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:8080
    depends_on:
      - postgres
      - redis
      - seq
      - loki
    tty: true
    stdin_open: true
    restart: unless-stopped

  auth-service:
    container_name: auth-service
    build:
      context: .
      dockerfile: backend/AuthService/AuthService.Web/Dockerfile
      target: app
      secrets:
        - nuget_config
        - nuget_username
        - nuget_password
    ports:
      - "8003:8003"
    env_file:
      - AuthService.Development.env
    depends_on:
      auth-service-migrator:
        condition: service_completed_successfully
      seq:
        condition: service_started
      loki:
        condition: service_started
    tty: true
    stdin_open: true
    restart: unless-stopped

  auth-service-migrator:
    container_name: auth-service-migrator
    build:
      context: .
      dockerfile: backend/AuthService/AuthService.Web/Dockerfile
      target: migrator
      secrets:
        - nuget_config
        - nuget_username
        - nuget_password
    env_file:
      - AuthService.Development.env
    depends_on:
      postgres:
        condition: service_healthy

  rabbitmq:
    container_name: rabbitmq
    image: rabbitmq:4.3.0-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    env_file:
      - DirectoryService.Development.env
    volumes:
      - D:/docker-data/directory-service/rabbitmq:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  loki:
    container_name: loki
    image: grafana/loki:3.5.12
    ports:
      - "3100:3100"
    volumes:
      - ./backend/infrastructure/observabillity/loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - D:/docker-data/backend/loki:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped

  grafana:
    container_name: grafana
    image: grafana/grafana:12.1.1
    ports:
      - "3000:3000"
    env_file:
      - Grafana.Development.env
    volumes:
      - ./backend/infrastructure/observabillity/grafana/provisioning/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
      - D:/docker-data/backend/grafana:/var/lib/grafana
    depends_on:
      - loki
    restart: unless-stopped

  alloy:
    container_name: alloy
    image: grafana/alloy:v1.10.2
    ports:
      - "12345:12345"
    volumes:
      - ./backend/infrastructure/observabillity/alloy/config.alloy:/etc/alloy/config.alloy:ro
      # Docker socket нужен Alloy для чтения stdout/stderr контейнеров в local dev.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - D:/docker-data/backend/alloy:/var/lib/alloy/data
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    depends_on:
      - loki
    restart: unless-stopped

  otel-collector:
    container_name: otel-collector
    image: otel/opentelemetry-collector-contrib:0.151.0
    command: ["--config=/etc/otelcol-contrib/otel-collector-config.yaml"]
    ports:
      - "4317:4317"
      - "4318:4318"
      - "9464:9464"
      - "13133:13133"
    volumes:
      - ./backend/infrastructure/observabillity/otel-collector/otel-collector-config.yaml:/etc/otelcol-contrib/otel-collector-config.yaml:ro
    restart: unless-stopped

  prometheus:
    container_name: prometheus
    image: prom/prometheus:v3.11.3
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    volumes:
      - D:/Projects/DirectoryService/backend/infrastructure/observabillity/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - D:/docker-data/backend/prometheus:/prometheus
    depends_on:
      - otel-collector
    restart: unless-stopped

  # Опциональный reverse proxy: запускается отдельно и не стартует backend-сервисы.
  nginx:
    image: nginx:1.29.4-alpine
    container_name: backend-nginx
    ports:
      - "8080:80"
    volumes:
      - D:/Projects/DirectoryService/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - D:/docker-data/backend/nginx/logs:/var/log/nginx


secrets:
  # BuildKit secrets нужны только для NuGet restore во время сборки images.
  nuget_config:
    file: ./nuget.config
  nuget_username:
    environment: NUGET_USERNAME
  nuget_password:
    environment: NUGET_PASSWORD
