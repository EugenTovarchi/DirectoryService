# Локальный Loki без встроенной авторизации; не открывать наружу без reverse proxy.
auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096

common:
  # Все рабочие данные Loki лежат на bind mount из D:/docker-data.
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    # TSDB v13 подходит для локального single-node Loki.
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  # Локальный retention, чтобы Docker-диск не рос бесконтрольно.
  retention_period: 72h
  allow_structured_metadata: true
  discover_log_levels: true

compactor:
  working_directory: /loki/compactor
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 2h
  delete_request_store: filesystem
