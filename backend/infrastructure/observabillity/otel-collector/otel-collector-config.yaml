# Health endpoint для локальной проверки Collector.
extensions:
  health_check:
    endpoint: 0.0.0.0:13133

receivers:
  # OTLP вход для backend-сервисов.
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    check_interval: 5s
    limit_mib: 256
    spike_limit_mib: 64
  resource:
    attributes:
      - key: deployment.environment
        value: docker-dev
        action: upsert
  batch:
    timeout: 5s
    send_batch_size: 1024

exporters:
  # Endpoint для будущего Prometheus scrape.
  prometheus:
    endpoint: 0.0.0.0:9464

service:
  extensions:
    - health_check
  pipelines:
    # Метрики принимаем по OTLP и отдаем Prometheus exporter.
    metrics:
      receivers:
        - otlp
      processors:
        - memory_limiter
        - resource
        - batch
      exporters:
        - prometheus

    # Scrape из Prometheus и Tempo будут подключены отдельными шагами.
