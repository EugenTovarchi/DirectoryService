apiVersion: 1

providers:
  # Dashboards лежат в репозитории и подхватываются Grafana при старте.
  - name: Backend Observability
    orgId: 1
    folder: Backend Observability
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    options:
      path: /var/lib/grafana/dashboards
