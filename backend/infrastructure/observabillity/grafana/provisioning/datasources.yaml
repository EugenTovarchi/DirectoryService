apiVersion: 1

datasources:
  # Общий Loki datasource для backend-сервисов и будущего frontend.
  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    editable: true

  # Prometheus datasource для метрик из OTel Collector.
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: false
    editable: true
