# Общий интервал scrape для local dev.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Метрики backend-сервисов приходят через OTel Collector.
  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:9464"]

  # Backend-сервисы напрямую не scrape-им до явной настройки метрик.
